<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
</head>
<body>
    <h2>Вход в систему</h2>
    <form id="authForm" method="get" action="/Lab2/Auth">
        <input type="text" name="login" placeholder="Логин"><br>
        <input type="password" name="password" placeholder="Пароль"><br>
        
        <input type="radio" name="method" value="get" checked onchange="document.getElementById('authForm').method = this.value"> GET
        <input type="radio" name="method" value="post" onchange="document.getElementById('authForm').method = this.value"> POST<br><br>
        
        <input type="submit" value="Войти">
    </form>
</body>
</html>
